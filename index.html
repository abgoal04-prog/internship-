<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Site Safety Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
        .header{background:#fff;padding:14px 32px;border-bottom:1px solid #e0e0e0;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between}
        .header h1{font-size:18px;color:#1a73e8;font-weight:700}
        .header p{font-size:12px;color:#888;margin-top:2px}
        .header-right{font-size:11px;color:#999;text-align:right}
        .nav-tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 32px;overflow-x:auto}
        .nav-tab{padding:12px 24px;cursor:pointer;font-size:13px;color:#777;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .3s;white-space:nowrap;user-select:none}
        .nav-tab:hover{color:#1a73e8;background:#f8f9fa}
        .nav-tab.active{color:#1a73e8;border-bottom-color:#1a73e8;font-weight:600}
        .tab-content{display:none;padding:24px 32px;max-width:1400px;margin:0 auto}
        .tab-content.active{display:block}
        .columns{display:flex;gap:24px}
        .col-left,.col-right{flex:1;min-width:0}
        .card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
        .card-header{display:flex;align-items:center;gap:8px;margin-bottom:20px}
        .card-header i{color:#1a73e8;font-size:16px}
        .card-header h2{font-size:15px;font-weight:600}
        .input-type-selector{display:flex;gap:8px;margin-bottom:16px}
        .input-type-btn{padding:8px 18px;border:1.5px solid #d5d5d5;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#666;transition:all .25s;display:flex;align-items:center;gap:6px}
        .input-type-btn:hover{border-color:#1a73e8;color:#1a73e8}
        .input-type-btn.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
        .model-banner{border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;display:flex;align-items:center;gap:8px}
        .model-banner.loading{background:#fff3cd;border:1px solid #ffc107;color:#856404}
        .model-banner.success{background:#d1fae5;border:1px solid #22c55e;color:#065f46}
        .model-banner.error{background:#fee2e2;border:1px solid #ef4444;color:#991b1b}
        .spinner-small{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
        .upload-wrapper{position:relative;margin-bottom:16px}
        .upload-area{border:2px dashed #ccc;border-radius:12px;padding:32px 16px;text-align:center;transition:all .3s;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafbfc;position:relative}
        .upload-area:hover{border-color:#1a73e8;background:#f0f7ff}
        .upload-area.dragover{border-color:#1a73e8;background:#e8f0fe}
        .upload-area i.upload-icon{font-size:36px;color:#bbb;margin-bottom:10px}
        .upload-area p{color:#999;font-size:13px}
        .upload-area .subtext{font-size:11px;color:#ccc;margin:4px 0}
        .upload-area .preview-img{max-width:100%;max-height:170px;border-radius:8px;display:none}
        .upload-area .upload-text{display:flex;flex-direction:column;align-items:center}
        .upload-area.has-file .upload-text{display:none}
        .upload-area.has-file .preview-img{display:block}
        .upload-area.has-file{padding:12px;border-style:solid;border-color:#22c55e}
        .video-preview-container{width:100%;text-align:center;display:none}
        .video-preview-container video{max-width:100%;max-height:170px;border-radius:8px}
        .btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
        .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .25s;display:flex;align-items:center;gap:6px}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-primary{background:#1a73e8;color:#fff}
        .btn-primary:hover:not(:disabled){background:#1557b0}
        .btn-danger{background:#fff;color:#d93025;border:1.5px solid #d93025}
        .btn-danger:hover:not(:disabled){background:#fce8e6}
        .btn-secondary{background:#fff;color:#555;border:1.5px solid #d0d0d0}
        .btn-secondary:hover{background:#f5f5f5}
        .progress-bar{width:100%;height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin:10px 0;display:none}
        .progress-fill{height:100%;background:#1a73e8;border-radius:3px;transition:width .3s;width:0%}
        .stats-section{margin-top:14px}
        .stats-section h3{font-size:13px;color:#333;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .stats-section h3 i{color:#1a73e8}
        .stat-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
        .stat-item strong{min-width:140px}
        .status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .status-dot.safe{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.5)}
        .status-dot.unsafe{background:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.5);animation:pulse 1s infinite}
        .status-dot.neutral{background:#94a3b8}
        .output-area{border:1px solid #e8e8e8;border-radius:12px;min-height:320px;display:flex;align-items:center;justify-content:center;background:#fafbfc;margin-bottom:16px;overflow:hidden}
        .output-area canvas{max-width:100%;max-height:420px;display:none;border-radius:8px}
        .output-placeholder{text-align:center;color:#bbb}
        .output-placeholder i{font-size:48px;margin-bottom:10px;display:block}
        .results-header{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:#333}
        .results-header i{color:#1a73e8}
        .results-table{width:100%;border-collapse:collapse;font-size:12px}
        .results-table th{background:#f5f7fa;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e8e8e8}
        .results-table td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
        .results-table tr:hover td{background:#f8f9fa}
        .badge{padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block}
        .badge-safe{background:#dcfce7;color:#166534}
        .badge-unsafe{background:#fee2e2;color:#991b1b}
        .badge-helmet{background:#dbeafe;color:#1e40af}
        .badge-hat{background:#fef3c7;color:#92400e}
        .badge-obj{background:#f1f5f9;color:#475569}
        .feature-analysis{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:11px;color:#475569}
        .feature-analysis h4{font-size:12px;color:#1e293b;margin-bottom:8px;font-weight:600}
        .feature-tag{display:inline-block;padding:3px 8px;margin:2px;border-radius:4px;font-size:10px;font-weight:600}
        .feature-tag.found{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
        .feature-tag.missing{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
        .color-swatches{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
        .color-swatch{width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:pointer;position:relative}
        .color-swatch.detected::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.5)}
        .filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
        .filter-bar select{padding:7px 12px;border:1px solid #d0d0d0;border-radius:8px;font-size:13px;background:#fff}
        .empty-state{text-align:center;padding:50px 20px;color:#bbb}
        .empty-state i{font-size:42px;margin-bottom:10px;display:block}
        .metric-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:24px}
        .metric-card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
        .metric-card .value{font-size:30px;font-weight:700;color:#1a73e8}
        .metric-card .label{font-size:11px;color:#999;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
        .chart-box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px}
        .chart-box h3{font-size:14px;margin-bottom:16px}
        .bar-chart{display:flex;align-items:flex-end;gap:12px;height:160px;padding-top:10px}
        .bar-col{display:flex;flex-direction:column;align-items:center;flex:1}
        .bar{width:100%;border-radius:6px 6px 0 0;transition:height .5s;min-height:2px}
        .bar-label{font-size:11px;color:#888;margin-top:6px;text-align:center}
        .bar-value{font-size:11px;font-weight:600;margin-bottom:4px}
        .alarm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(239,68,68,.08);pointer-events:none;z-index:999;animation:alarmFlash .5s ease-in-out 6;display:none}
        .webcam-container video{width:100%;border-radius:8px}
        .helmet-colors-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0}
        .helmet-color-item{text-align:center;padding:4px;border-radius:6px;background:#f8fafc;border:1px solid #e2e8f0}
        .helmet-color-item .dot{width:24px;height:24px;border-radius:50%;margin:0 auto 4px;border:2px solid rgba(0,0,0,.1)}
        .helmet-color-item .name{font-size:9px;color:#666}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes alarmFlash{0%,100%{background:rgba(239,68,68,.08)}50%{background:rgba(239,68,68,.18)}}
        @keyframes safeFlash{0%,100%{background:rgba(34,197,94,.05)}50%{background:rgba(34,197,94,.12)}}
        .hidden{display:none!important}
        @media(max-width:800px){.columns{flex-direction:column}.tab-content{padding:16px}.nav-tabs{padding:0 16px}.helmet-colors-grid{grid-template-columns:repeat(3,1fr)}}
    </style>
</head>
<body>
<div id="alarmOverlay" class="alarm-overlay"></div>

<header class="header">
    <div>
